<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrono Archive — Lịch Records</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,700;0,800;1,300;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --glass:        rgba(255,255,255,0.18);
      --glass-mid:    rgba(255,255,255,0.26);
      --glass-strong: rgba(255,255,255,0.36);
      --border:       rgba(255,255,255,0.38);
      --border-mid:   rgba(255,255,255,0.55);
      --text:         rgba(255,255,255,0.96);
      --text-mid:     rgba(255,255,255,0.72);
      --text-dim:     rgba(255,255,255,0.48);
      --blue:         #7AAFC2;
      --blue-lt:      #A8C8DA;
      --shadow:       0 8px 32px rgba(30,50,90,0.18);
      --shadow-lg:    0 16px 48px rgba(30,50,90,0.22);
      --ts: 0 1px 8px rgba(30,50,90,0.35);   /* text shadow */
    }

    html, body { height: 100%; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: #B0BFD0;
    }

    /* ═══════════════════════
       BACKGROUND CANVAS
    ═══════════════════════ */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ═══════════════════════
       DOODLE LAYER
    ═══════════════════════ */
    .doodle-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .doodle {
      position: absolute;
      opacity: 0;
      animation: floatDoodle var(--dur, 8s) ease-in-out var(--delay, 0s) infinite;
    }

    @keyframes floatDoodle {
      0%   { opacity: 0;    transform: translateY(0px) rotate(0deg)   scale(1); }
      15%  { opacity: 0.55; }
      50%  { opacity: 0.45; transform: translateY(-18px) rotate(8deg)  scale(1.05); }
      85%  { opacity: 0.55; }
      100% { opacity: 0;    transform: translateY(0px) rotate(0deg)   scale(1); }
    }

    /* ═══════════════════════
       APP WRAPPER
    ═══════════════════════ */
    .app {
      position: relative;
      z-index: 2;
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 2.4rem;
    }

    /* ═══════════════════════
       NAV — glass
    ═══════════════════════ */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.6rem;
      margin: 1.2rem 0 0;
      background: var(--glass);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2.2rem;
    }

    .nav-links li { position: relative; }

    .nav-links a {
      font-size: .8rem;
      font-weight: 400;
      letter-spacing: .05em;
      color: var(--text-mid);
      text-decoration: none;
      transition: color .2s;
      text-shadow: var(--ts);
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); font-weight: 600; }

    .nav-links li.active-dot::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 6px rgba(255,255,255,0.8);
    }

    .nav-profile { display: flex; align-items: center; gap: .8rem; }

    .nav-text { text-align: right; }

    .nav-handle {
      font-size: .8rem; font-weight: 600;
      color: var(--text);
      text-shadow: var(--ts);
    }

    .nav-sub {
      font-size: .68rem;
      color: var(--text-mid);
      margin-top: .1rem;
      letter-spacing: .05em;
      text-shadow: var(--ts);
    }

    .nav-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--glass-mid);
      backdrop-filter: blur(10px);
      border: 1.5px solid var(--border-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; font-weight: 800;
      color: white;
      text-shadow: var(--ts);
      box-shadow: var(--shadow);
    }

    /* ═══════════════════════
       STAGE
    ═══════════════════════ */
    .stage {
      position: relative;
      min-height: 660px;
      margin-top: 1.4rem;
    }

    /* ═══════════════════════
       VINYL
    ═══════════════════════ */
    .vinyl-wrap {
      position: absolute;
      left: -75px; top: -15px;
      width: 430px; height: 430px;
      z-index: 3;
    }

    .vinyl-svg {
      width: 100%; height: 100%;
      animation: vinylSpin 26s linear infinite, vinylGlow 3s ease-in-out infinite;
    }

    .vinyl-svg.paused {
      animation-play-state: paused;
    }

    @keyframes vinylSpin { to { transform: rotate(360deg); } }

    @keyframes vinylGlow {
      0%, 100% {
        filter:
          drop-shadow(0 0 10px rgba(160,200,220,0.35))
          drop-shadow(0 0 25px rgba(160,200,220,0.15));
      }
      50% {
        filter:
          drop-shadow(0 0 20px rgba(160,200,220,0.6))
          drop-shadow(0 0 50px rgba(160,200,220,0.25));
      }
    }

    /* Arc (static) */
    .arc-svg {
      position: absolute; inset: -8px;
      width: calc(100% + 16px);
      height: calc(100% + 16px);
      pointer-events: none; z-index: 4;
      animation: arcPulse 3s ease-in-out infinite;
    }

    @keyframes arcPulse {
      0%, 100% { opacity: 0.75; }
      50%       { opacity: 1; }
    }

    /* EQ bars (show when playing) */
    .eq-bars {
      position: absolute;
      bottom: 30px; right: -10px;
      display: flex; gap: 3px; align-items: flex-end;
      height: 24px; z-index: 5;
      opacity: 0;
      transition: opacity .5s;
    }

    .eq-bars.visible { opacity: 1; }

    .eq-bar {
      width: 4px;
      border-radius: 2px;
      background: white;
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
    }

    .eq-bar:nth-child(1) { animation: eq1 0.9s ease-in-out infinite; height: 8px; }
    .eq-bar:nth-child(2) { animation: eq2 0.7s ease-in-out infinite; height: 14px; }
    .eq-bar:nth-child(3) { animation: eq3 1.1s ease-in-out infinite; height: 10px; }
    .eq-bar:nth-child(4) { animation: eq4 0.8s ease-in-out infinite; height: 18px; }
    .eq-bar:nth-child(5) { animation: eq5 1.0s ease-in-out infinite; height: 6px; }

    @keyframes eq1 { 0%,100%{height:8px} 50%{height:20px} }
    @keyframes eq2 { 0%,100%{height:14px} 50%{height:6px} }
    @keyframes eq3 { 0%,100%{height:10px} 50%{height:22px} }
    @keyframes eq4 { 0%,100%{height:18px} 50%{height:8px} }
    @keyframes eq5 { 0%,100%{height:6px} 50%{height:16px} }

    /* Controls */
    .vinyl-controls {
      position: absolute;
      bottom: 26px; left: 62px;
      display: flex; gap: .5rem; z-index: 5;
    }

    .ctrl {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--border-mid);
      background: var(--glass-mid);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .22s;
      box-shadow: var(--shadow);
    }

    .ctrl:hover {
      background: var(--glass-strong);
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(30,50,90,0.25), 0 0 0 2px rgba(255,255,255,0.3);
    }

    .ctrl svg { width: 12px; height: 12px; }

    /* Now playing label */
    .now-playing {
      position: absolute;
      bottom: 20px; left: 108px;
      font-size: .68rem;
      color: var(--text-mid);
      text-shadow: var(--ts);
      opacity: 0;
      transition: opacity .5s;
      letter-spacing: .05em;
    }

    .now-playing.visible { opacity: 1; }

    /* ═══════════════════════
       INFO SECTION — glass card
    ═══════════════════════ */
    .info-section {
      position: absolute;
      left: 322px; top: 70px;
      max-width: 290px;
      z-index: 3;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 1.6rem 1.5rem;
      box-shadow: var(--shadow-lg);
    }

    .rec-num {
      font-size: 2.1rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.05;
      letter-spacing: -.02em;
      text-shadow: 0 2px 12px rgba(30,50,90,0.3);
    }

    .rec-by {
      font-size: .8rem;
      color: var(--text-mid);
      font-style: italic;
      font-weight: 300;
      margin: .3rem 0 1rem;
      text-shadow: var(--ts);
    }

    .rec-desc {
      font-size: .86rem;
      line-height: 1.95;
      color: var(--text-mid);
      font-weight: 300;
      text-shadow: var(--ts);
    }

    .rec-more {
      display: inline-block;
      margin-top: .9rem;
      color: var(--text);
      font-style: italic;
      font-size: .8rem;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .2s;
      text-shadow: var(--ts);
      font-weight: 500;
    }

    .rec-more:hover { opacity: .65; }

    /* ═══════════════════════
       SUBSCRIBE BTN — glass
    ═══════════════════════ */
    .sub-btn {
      position: absolute;
      left: 322px; top: 390px;
      z-index: 3;
      padding: .85rem 2rem;
      background: var(--glass-mid);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1.5px solid var(--border-mid);
      border-radius: 100px;
      color: var(--text);
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: .83rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .25s;
      box-shadow: var(--shadow);
      text-shadow: var(--ts);
      letter-spacing: .02em;
    }

    .sub-btn:hover {
      background: var(--glass-strong);
      box-shadow: var(--shadow-lg), 0 0 0 2px rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    /* ═══════════════════════
       SEARCH — glass
    ═══════════════════════ */
    .search-bar {
      position: absolute;
      bottom: 24px; left: 8px; right: 380px;
      z-index: 3;
      display: flex; align-items: center; gap: .9rem;
      padding: .88rem 1.3rem;
      background: var(--glass-mid);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1.5px solid var(--border-mid);
      border-radius: 16px;
      box-shadow: var(--shadow);
      transition: all .25s;
    }

    .search-bar:focus-within {
      background: var(--glass-strong);
      box-shadow: var(--shadow-lg), 0 0 0 2px rgba(255,255,255,0.25);
    }

    .search-ico { flex-shrink: 0; opacity: .7; }

    .search-inp {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text);
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: .87rem; font-weight: 300;
    }

    .search-inp::placeholder { color: var(--text-dim); font-style: italic; }

    .search-x {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--text-mid);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; transition: background .2s; flex-shrink: 0;
    }

    .search-x:hover { background: rgba(255,255,255,0.3); color: white; }

    /* ═══════════════════════
       RIGHT PANEL — glass
    ═══════════════════════ */
    .right-panel {
      position: absolute;
      right: 0; top: 0;
      width: 330px; z-index: 3;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 1.5rem 1.3rem 1.2rem;
      box-shadow: var(--shadow-lg);
    }

    .panel-title {
      font-size: 1.6rem; font-weight: 800;
      color: var(--text);
      margin-bottom: .3rem;
      letter-spacing: -.01em;
      font-style: italic;
      text-shadow: 0 2px 12px rgba(30,50,90,0.3);
    }

    .week-label {
      font-size: .7rem;
      color: var(--text-dim);
      letter-spacing: .07em;
      margin-bottom: .85rem;
      text-shadow: var(--ts);
    }

    /* ─── SCHEDULE ROWS ─── */
    .sched-list { display: flex; flex-direction: column; gap: .45rem; }

    .srow {
      display: flex; align-items: center; gap: .72rem;
      padding: .6rem .85rem;
      border-radius: 12px;
      transition: all .22s;
      cursor: default;
    }

    .srow.offline {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .srow.stream {
      background: var(--glass-mid);
      border: 1.5px solid var(--border-mid);
      box-shadow: 0 4px 20px rgba(30,50,90,0.12),
                  inset 0 0 20px rgba(255,255,255,0.06);
    }

    .srow.stream:hover {
      background: var(--glass-strong);
      transform: translateX(3px);
      box-shadow: 0 6px 24px rgba(30,50,90,0.16);
    }

    /* Day badge */
    .day-badge { width: 36px; flex-shrink: 0; text-align: center; }

    .day-name {
      font-size: .65rem; font-weight: 700;
      letter-spacing: .07em;
      color: var(--text);
      text-shadow: var(--ts);
    }

    .day-date {
      font-size: .58rem;
      color: var(--text-dim);
      margin-top: .04rem;
      text-shadow: var(--ts);
    }

    .srow.offline .day-name { color: var(--text-dim); }

    /* Divider */
    .day-div {
      width: 1px; height: 26px; flex-shrink: 0;
      background: rgba(255,255,255,0.25);
    }

    .srow.offline .day-div { background: rgba(255,255,255,0.12); }

    /* Row content */
    .srow-info { flex: 1; }

    .srow-activity {
      font-size: .8rem; font-weight: 600;
      color: var(--text);
      text-shadow: var(--ts);
    }

    .srow.offline .srow-activity {
      font-size: .76rem; font-weight: 300;
      color: var(--text-dim); font-style: italic;
    }

    .srow-sub {
      font-size: .65rem; color: var(--text-mid);
      margin-top: .08rem; text-shadow: var(--ts);
    }

    /* Time badge */
    .time-badge {
      font-size: .7rem; font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      padding: .2rem .5rem;
      flex-shrink: 0;
      text-shadow: none;
      backdrop-filter: blur(6px);
    }

    /* ─── NOW PLAYING BADGE in right panel ─── */
    .np-badge {
      margin-top: 1rem;
      display: flex; align-items: center; gap: .5rem;
      padding: .6rem .9rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      opacity: 0;
      transition: opacity .5s;
    }

    .np-badge.visible { opacity: 1; }

    .np-bars {
      display: flex; gap: 2px; align-items: flex-end; height: 16px;
    }

    .np-bar {
      width: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.8);
    }

    .np-bar:nth-child(1) { animation: eq1 0.9s ease-in-out infinite; }
    .np-bar:nth-child(2) { animation: eq2 0.7s ease-in-out infinite; }
    .np-bar:nth-child(3) { animation: eq3 1.1s ease-in-out infinite; }

    .np-text {
      font-size: .7rem; color: var(--text-mid);
      font-style: italic; text-shadow: var(--ts);
    }

    /* ─── FOOTER QUOTE ─── */
    .footer-quote {
      margin-top: 1rem;
      text-align: right;
      font-style: italic;
      font-size: .7rem; line-height: 2;
      color: var(--text-dim);
      text-shadow: var(--ts);
    }

    /* ═══════════════════════
       VOLUME CONTROL
    ═══════════════════════ */
    .vol-control {
      position: absolute;
      bottom: 26px; right: 0;
      width: 330px; z-index: 3;
      display: flex; align-items: center; gap: .7rem;
      padding: .7rem 1rem;
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .vol-ico { font-size: .85rem; opacity: .75; flex-shrink: 0; }

    .vol-slider {
      flex: 1; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.25);
      border-radius: 2px; outline: none; cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 2px 8px rgba(30,50,90,0.3);
      cursor: pointer;
    }

    /* ═══════════════════════
       RESPONSIVE
    ═══════════════════════ */
    @media (max-width: 780px) {
      .stage { min-height: auto; }
      .vinyl-wrap { position: relative; left: 0; top: 0; width: 280px; height: 280px; margin: 0 auto 1rem; }
      .info-section, .sub-btn, .search-bar, .right-panel, .vol-control {
        position: relative; left: auto; right: auto; top: auto; bottom: auto;
        margin: 1rem 0; width: 100%; max-width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- HTML5 Audio -->
<audio id="bgAudio" src="./call-of-silence.mp3" loop preload="auto"></audio>

<!-- Background watercolor canvas -->
<canvas id="bgCanvas"></canvas>

<!-- Floating doodle layer -->
<div class="doodle-layer" id="doodleLayer"></div>

<div class="app">

  <!-- NAV -->
  <nav>
    <ul class="nav-links">
      <li><a href="#">home</a></li>
      <li><a href="#">bài viết</a></li>
      <li><a href="#">lore</a></li>
      <li><a href="#">biên niên</a></li>
      <li class="active-dot"><a href="#" class="active">lịch stream</a></li>
    </ul>
    <div class="nav-profile">
      <div class="nav-text">
        <div class="nav-handle">@zierune</div>
        <div class="nav-sub">Chrono Archive</div>
      </div>
      <div class="nav-avatar">Z</div>
    </div>
  </nav>

  <!-- STAGE -->
  <div class="stage">

    <!-- ── VINYL ── -->
    <div class="vinyl-wrap">
      <svg class="vinyl-svg" id="vinylDisc" viewBox="0 0 430 430" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="vg" cx="38%" cy="32%" r="66%">
            <stop offset="0%"   stop-color="#2C2C3A"/>
            <stop offset="35%"  stop-color="#19192A"/>
            <stop offset="100%" stop-color="#0C0C18"/>
          </radialGradient>
          <radialGradient id="lg" cx="42%" cy="38%" r="60%">
            <stop offset="0%"   stop-color="#2A2A3E"/>
            <stop offset="100%" stop-color="#181828"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <circle cx="215" cy="215" r="213" fill="url(#vg)"/>
        <!-- gloss highlight -->
        <ellipse cx="160" cy="140" rx="100" ry="62"
          fill="white" opacity="0.025" transform="rotate(-25 160 140)"/>
        <g id="grooves"></g>
        <circle cx="215" cy="215" r="68" fill="url(#lg)"/>
        <circle cx="215" cy="215" r="67" fill="none" stroke="rgba(160,195,215,0.35)" stroke-width="0.9"/>
        <circle cx="215" cy="215" r="59" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <text x="215" y="210" text-anchor="middle"
          font-family="'Be Vietnam Pro',sans-serif" font-size="7" font-weight="700"
          fill="rgba(180,210,225,0.7)" letter-spacing="3.5">CHRONO</text>
        <text x="215" y="222" text-anchor="middle"
          font-family="'Be Vietnam Pro',sans-serif" font-size="7" font-weight="700"
          fill="rgba(180,210,225,0.7)" letter-spacing="3.5">ARCHIVE</text>
        <circle cx="215" cy="215" r="13" fill="#D4D8E0"/>
        <circle cx="215" cy="215" r="11" fill="#111120"/>
      </svg>

      <!-- Static blue arc -->
      <svg class="arc-svg" viewBox="0 0 446 446" xmlns="http://www.w3.org/2000/svg">
        <circle cx="223" cy="223" r="218" fill="none"
          stroke="rgba(255,255,255,0.65)" stroke-width="4.5"
          stroke-linecap="round"
          stroke-dasharray="295 1075"
          stroke-dashoffset="260"/>
      </svg>

      <!-- EQ bars (visible when music plays) -->
      <div class="eq-bars" id="eqBars">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>

      <!-- Controls -->
      <div class="vinyl-controls">
        <button class="ctrl" id="pauseBtn" onclick="toggleDisc()" title="Tạm dừng">
          <svg viewBox="0 0 12 14" fill="white">

          <div class="np-bar"></div>
          <div class="np-bar"></div>

<script>
/* ══════════════════════════════════════════════════
   CẬP NHẬT MỖI TUẦN
══════════════════════════════════════════════════ */
const WEEK_OF = "13/7 — 19/7";

const WEEK_SCHEDULE = [
  { day:"T.2", date:"13/7", status:"stream",  activity:"Freetalk",  time:"20:00", note:"nói chuyện, yapping, không chủ đề cố định" },
  { day:"T.3", date:"14/7", status:"off",     activity:"",          time:"",      note:"" },
  { day:"T.4", date:"15/7", status:"off",     activity:"",          time:"",      note:"" },
  { day:"T.5", date:"16/7", status:"stream",  activity:"Warframe",  time:"20:00", note:"space ninja, grind chill" },
  { day:"T.6", date:"17/7", status:"off",     activity:"",          time:"",      note:"" },
  { day:"T.7", date:"18/7", status:"off",     activity:"",          time:"",      note:"" },
  { day:"CN",  date:"19/7", status:"off",     activity:"",          time:"",      note:"" },
];

const streamDay = WEEK_SCHEDULE.find(d => d.status === "stream");
const featured  = streamDay ? {
  id: 4,
  date: `thứ Hai, 13/7`,
  desc: `Tuần này 2 stream —<br>thứ Hai talk chill,<br>thứ Năm chiến Warframe.`,
} : null;

/* ════════════════════════
   WATERCOLOR BACKGROUND
════════════════════════ */
(function paintBg() {
  const cv = document.getElementById("bgCanvas");
  const ctx = cv.getContext("2d");
  let W, H;

  function paint() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;

    // Base sky gradient
    const base = ctx.createLinearGradient(0, 0, W * 0.7, H);
    base.addColorStop(0,   "#C8D4E4");
    base.addColorStop(0.4, "#B4C3D6");
    base.addColorStop(1,   "#A0B2C8");
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, W, H);

    // Cloud patches — dark blue blobs
    const darkCloud = [
      "rgba(75, 95, 130, 0.17)",
      "rgba(85,105,140, 0.13)",
      "rgba(65, 85, 120, 0.20)",
      "rgba(95,115,150, 0.10)",
      "rgba(55, 78, 115, 0.22)",
    ];

    const lightCloud = [
      "rgba(215,228,242, 0.22)",
      "rgba(200,218,238, 0.18)",
    ];

    const cloudDefs = [
      { x:.28,y:.22,rx:.26,ry:.20,dark:true  },
      { x:.52,y:.40,rx:.22,ry:.25,dark:true  },
      { x:.08,y:.58,rx:.30,ry:.22,dark:true  },
      { x:.72,y:.52,rx:.20,ry:.18,dark:true  },
      { x:.42,y:.70,rx:.24,ry:.20,dark:true  },
      { x:.60,y:.18,rx:.18,ry:.14,dark:false },
      { x:.88,y:.35,rx:.22,ry:.16,dark:true  },
      { x:.15,y:.30,rx:.20,ry:.16,dark:false },
      { x:.35,y:.85,rx:.28,ry:.18,dark:true  },
      { x:.78,y:.78,rx:.18,ry:.22,dark:false },
    ];

    // Enable blur for watercolor bleed
    cloudDefs.forEach((b, i) => {
      ctx.save();
      ctx.filter = `blur(${Math.random()*10+6}px)`;
      const colors = b.dark ? darkCloud : lightCloud;
      const col = colors[i % colors.length];
      const cx = b.x * W, cy = b.y * H;
      const rx = b.rx * W, ry = b.ry * H;

      for (let j = 0; j < 6; j++) {
        const jx = cx + (Math.random()-.5)*rx*.4;
        const jy = cy + (Math.random()-.5)*ry*.4;
        const erx = rx * (.6 + Math.random()*.7);
        const ery = ry * (.6 + Math.random()*.7);
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.ellipse(jx, jy, erx, ery, Math.random()*Math.PI, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    });

    // Lighter haze layer
    ctx.save();
    ctx.filter = "blur(30px)";
    ctx.fillStyle = "rgba(220,232,248,0.1)";
    ctx.beginPath();
    ctx.ellipse(W*.5, H*.5, W*.7, H*.4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  paint();
  window.addEventListener("resize", paint);
})();

/* ════════════════════════
   FLOATING DOODLES
════════════════════════ */
(function spawnDoodles() {
  const layer = document.getElementById("doodleLayer");

  function flower(size) {
    const s = document.createElementNS("http://www.w3.org/2000/svg","svg");
    s.setAttribute("viewBox","0 0 40 40");
    s.setAttribute("width", size); s.setAttribute("height", size);
    s.innerHTML = `
      <g fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round">
        <circle cx="20" cy="12" r="5"/>
        <circle cx="28" cy="20" r="5"/>
        <circle cx="20" cy="28" r="5"/>
        <circle cx="12" cy="20" r="5"/>
        <circle cx="20" cy="20" r="4" stroke="rgba(255,255,255,0.5)"/>
      </g>`;
    return s;
  }

  function star4(size) {
    const s = document.createElementNS("http://www.w3.org/2000/svg","svg");
    s.setAttribute("viewBox","0 0 30 30");
    s.setAttribute("width", size); s.setAttribute("height", size);
    s.innerHTML = `
      <g stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round">
        <line x1="15" y1="2"  x2="15" y2="28"/>
        <line x1="2"  y1="15" x2="28" y2="15"/>
        <line x1="6"  y1="6"  x2="24" y2="24" stroke-width="1"/>
        <line x1="24" y1="6"  x2="6"  y2="24" stroke-width="1"/>
      </g>`;
    return s;
  }

  function swirl(size) {
    const s = document.createElementNS("http://www.w3.org/2000/svg","svg");
    s.setAttribute("viewBox","0 0 50 40");
    s.setAttribute("width", size*1.3); s.setAttribute("height", size);
    s.innerHTML = `
      <path d="M5,20 Q10,5 20,15 Q30,25 40,10 Q45,5 48,15"
        fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2" stroke-linecap="round"/>`;
    return s;
  }

  function cross(size) {
    const s = document.createElementNS("http://www.w3.org/2000/svg","svg");
    s.setAttribute("viewBox","0 0 20 20");
    s.setAttribute("width", size*.6); s.setAttribute("height", size*.6);
    s.innerHTML = `
      <g stroke="rgba(255,255,255,0.65)" stroke-width="2" stroke-linecap="round">
        <line x1="2" y1="2" x2="18" y2="18"/>
        <line x1="18" y1="2" x2="2" y2="18"/>
      </g>`;
    return s;
  }

  const factories = [flower, star4, swirl, cross];
  const count = 18;

  for (let i = 0; i < count; i++) {
    const wrap = document.createElement("div");
    wrap.className = "doodle";
    const size = Math.random() * 22 + 14;
    const fn = factories[Math.floor(Math.random() * factories.length)];
    wrap.appendChild(fn(size));

    wrap.style.left  = `${Math.random() * 95}vw`;
    wrap.style.top   = `${Math.random() * 90}vh`;
    wrap.style.setProperty("--dur",   `${Math.random()*7 + 6}s`);
    wrap.style.setProperty("--delay", `${Math.random()*8}s`);
    wrap.style.transform = `rotate(${Math.random()*360}deg)`;
    layer.appendChild(wrap);
  }
})();

/* ════════════════════════
   VINYL GROOVES
════════════════════════ */
(function() {
  const g = document.getElementById("grooves");
  for (let r = 74; r <= 208; r += 2.5) {
    const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx","215"); c.setAttribute("cy","215");
    c.setAttribute("r", r);
    c.setAttribute("fill","none");
    const op = (r % 5 < 2.5) ? 0.052 : 0.022;
    c.setAttribute("stroke",`rgba(255,255,255,${op})`);
    c.setAttribute("stroke-width","1");
    g.appendChild(c);
  }
})();

/* ════════════════════════
   AUDIO
════════════════════════ */
const bgAudio = document.getElementById("bgAudio");
bgAudio.volume = document.getElementById("volSlider").value / 100;

document.getElementById("volSlider").addEventListener("input", function() {
  bgAudio.volume = this.value / 100;
});

/* ════════════════════════
   DISC TOGGLE
════════════════════════ */
let discPaused = true;

// UI always follows audio state — not the other way around
function setDiscPlaying(playing) {
  discPaused = !playing;
  const disc     = document.getElementById("vinylDisc");
  const pauseBtn = document.getElementById("pauseBtn");
  const playBtn  = document.getElementById("playBtn");
  const eqBars   = document.getElementById("eqBars");
  const npLabel  = document.getElementById("nowPlayingLabel");
  const npBadge  = document.getElementById("npBadge");

  if (playing) {
    disc.classList.remove("paused");
    pauseBtn.style.display = "flex";
    playBtn.style.display  = "none";
    eqBars.classList.add("visible");
    npLabel.classList.add("visible");
    npBadge.classList.add("visible");
  } else {
    disc.classList.add("paused");
    pauseBtn.style.display = "none";
    playBtn.style.display  = "flex";
    eqBars.classList.remove("visible");
    npLabel.classList.remove("visible");
    npBadge.classList.remove("visible");
  }
}

// Audio events drive the UI
bgAudio.addEventListener("play",    () => setDiscPlaying(true));
bgAudio.addEventListener("playing", () => setDiscPlaying(true));
bgAudio.addEventListener("pause",   () => setDiscPlaying(false));
bgAudio.addEventListener("ended",   () => setDiscPlaying(false));

// Initialize: disc paused, play button visible
setDiscPlaying(false);

// Try autoplay — if browser allows it, events above will flip the UI
bgAudio.play().catch(() => {
  // Blocked — disc stays paused, user clicks play button
});

// Toggle: just control audio; events handle disc UI
function toggleDisc() {
  if (bgAudio.paused) {
    bgAudio.play().catch(() => {});
  } else {
    bgAudio.pause();
  }
}

/* ════════════════════════
   RENDER FEATURED
════════════════════════ */
function renderFeatured() {
  const el = document.getElementById("featInfo");
  if (!featured) {
    el.innerHTML = `
      <div class="rec-num" style="font-size:1.4rem">tuần này,</div>
      <div class="rec-by">Archive tạm đóng cửa.</div>
      <div class="rec-desc" style="margin-top:.6rem">Thư viện cần sắp xếp lại một vài kệ sách.</div>`;
    return;
  }
  el.innerHTML = `
    <div class="rec-num">Record #${featured.id}</div>
    <div class="rec-by">Zi Eer · ${featured.date}</div>
    <div class="rec-desc">${featured.desc}</div>
    <a class="rec-more">đọc thêm..</a>`;
}

/* ════════════════════════
   RENDER SCHEDULE
════════════════════════ */
function renderSchedule() {
  document.getElementById("weekLabel").textContent = `tuần ${WEEK_OF}`;
  const list = document.getElementById("schedList");
  list.innerHTML = "";

  WEEK_SCHEDULE.forEach(d => {
    const row = document.createElement("div");
    row.className = `srow ${d.status}`;
    const label = d.status === "tba" ? "— TBA" : "Offline";
    row.innerHTML = `
      <div class="day-badge">
        <div class="day-name">${d.day}</div>
        <div class="day-date">${d.date}</div>
      </div>
      <div class="day-div"></div>
      <div class="srow-info">
        <div class="srow-activity">${d.status==="stream" ? d.activity : label}</div>
        ${d.note ? `<div class="srow-sub">${d.note}</div>` : ""}
      </div>
      ${d.status==="stream" && d.time ? `<div class="time-badge">${d.time}</div>` : ""}
    `;
    list.appendChild(row);
  });
}

/* ════════════════════════
   SEARCH CLEAR
════════════════════════ */
document.querySelector(".search-x").addEventListener("click", () => {
  document.querySelector(".search-inp").value = "";
});

renderFeatured();
renderSchedule();
</script>
